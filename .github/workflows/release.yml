name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Verify tag and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(uv run --no-project python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$PYPROJECT_VERSION" ]; then
            echo "tag $GITHUB_REF_NAME (stripped: $TAG) does not match pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi

      - name: Build
        run: uv build
